x-mlflow-image: &mlflow-image
  build:
    context: .
    args:
      VERSION: ${MLFLOW_VERSION:-3.12.0}
      PYTHON_VERSION: ${PYTHON_VERSION:-3.12.13}
  image: ghcr.io/davidliyutong/mlflow-docker:latest

services:
  db:
    image: mysql:5.7
    restart: unless-stopped
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: mlflow
      MYSQL_DATABASE: mlflowdb
      MYSQL_USER: mlflow
      MYSQL_PASSWORD: mlflow
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: /data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    environment:
      RUSTFS_ACCESS_KEY: mlflow
      RUSTFS_SECRET_KEY: mlflowpassword
      RUSTFS_CONSOLE_ENABLE: "true"

  rustfs-init:
    <<: *mlflow-image
    depends_on:
      - rustfs
    restart: "no"
    entrypoint: python
    command:
      - -c
      - |
        import os
        import time

        import boto3
        from botocore.config import Config
        from botocore.exceptions import ClientError

        endpoint = os.environ["MLFLOW_S3_ENDPOINT_URL"]
        bucket = os.environ["MLFLOW_S3_BUCKET"]
        client = boto3.client(
            "s3",
            endpoint_url=endpoint,
            aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
            aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
            region_name=os.environ.get("AWS_DEFAULT_REGION", "us-east-1"),
            config=Config(signature_version="s3v4", s3={"addressing_style": "path"}),
        )

        deadline = time.time() + 90
        last_error = None
        while time.time() < deadline:
            try:
                client.list_buckets()
                break
            except Exception as exc:
                last_error = exc
                print(f"Waiting for RustFS at {endpoint}: {exc}")
                time.sleep(2)
        else:
            raise SystemExit(f"RustFS was not ready before timeout: {last_error}")

        try:
            client.head_bucket(Bucket=bucket)
            print(f"Bucket already exists: {bucket}")
        except ClientError as exc:
            status = exc.response.get("ResponseMetadata", {}).get("HTTPStatusCode")
            code = exc.response.get("Error", {}).get("Code")
            if status == 404 or code in {"404", "NoSuchBucket"}:
                client.create_bucket(Bucket=bucket)
                print(f"Bucket created: {bucket}")
            else:
                raise
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://rustfs:9000
      MLFLOW_S3_BUCKET: mlflow
      AWS_ACCESS_KEY_ID: mlflow
      AWS_SECRET_ACCESS_KEY: mlflowpassword
      AWS_DEFAULT_REGION: us-east-1

  mlflow:
    <<: *mlflow-image
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      MYSQL_DATABASE: mlflowdb
      MYSQL_USER: mlflow
      MYSQL_PASSWORD: mlflow
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MLFLOW_S3_ENDPOINT_URL: http://rustfs:9000
      MLFLOW_S3_IGNORE_TLS: "true"
      MLFLOW_S3_BUCKET: mlflow
      MLFLOW_ALLOWED_HOSTS: ${MLFLOW_ALLOWED_HOSTS:-mlflow.company.com,192.168.1.100}
      AWS_ACCESS_KEY_ID: mlflow
      AWS_SECRET_ACCESS_KEY: mlflowpassword
      AWS_DEFAULT_REGION: us-east-1

volumes:
  db_data:
  rustfs_data:
