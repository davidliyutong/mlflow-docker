name: Build and Push Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: false
        default: "latest"
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve publish variables
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          read_make_var() {
            make --no-print-directory "print-$1"
          }

          VERSION="$(read_make_var VERSION)"
          NAMESPACE="$(read_make_var NAMESPACE)"
          IMAGE="$(read_make_var IMAGE)"
          if [ -z "$VERSION" ] || [ -z "$NAMESPACE" ] || [ -z "$IMAGE" ]; then
            echo "Missing VERSION, NAMESPACE, or IMAGE in Makefile" >&2
            exit 1
          fi

          IMAGE_NAME_LOWER="${IMAGE_NAME,,}"
          TARGET_IMAGE="$REGISTRY/$IMAGE_NAME_LOWER"

          if [ "$EVENT_NAME" = "release" ]; then
            TAGS=(
              "$TARGET_IMAGE:$RELEASE_TAG"
              "$TARGET_IMAGE:$VERSION"
              "$TARGET_IMAGE:latest"
            )
          elif [ -n "$INPUT_IMAGE_TAG" ]; then
            TAGS=("$TARGET_IMAGE:$INPUT_IMAGE_TAG")
          else
            TAGS=("$TARGET_IMAGE:latest")
          fi

          {
            echo "source_image=$NAMESPACE/$IMAGE:$VERSION"
            echo "tags=${TAGS[*]}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: make build

      - name: Tag and push image
        shell: bash
        env:
          SOURCE_IMAGE: ${{ steps.vars.outputs.source_image }}
          TAGS: ${{ steps.vars.outputs.tags }}
        run: |
          set -euo pipefail

          for tag in $TAGS; do
            docker tag "$SOURCE_IMAGE" "$tag"
            docker push "$tag"
          done
