name: Build and Push Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: false
        default: "latest"
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve publish variables
        id: vars
        shell: bash
        run: |
          read_make_var() {
            make -pn | awk -F ' = ' -v key="$1" '$1 == key { print $2; exit }'
          }

          VERSION="$(read_make_var VERSION)"
          NAMESPACE="$(read_make_var NAMESPACE)"
          IMAGE="$(read_make_var IMAGE)"
          if [ -z "$VERSION" ] || [ -z "$NAMESPACE" ] || [ -z "$IMAGE" ]; then
            echo "Missing VERSION, NAMESPACE, or IMAGE in Makefile" >&2
            exit 1
          fi

          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="latest"
          fi

          echo "source_image=$NAMESPACE/$IMAGE:$VERSION" >> "$GITHUB_OUTPUT"
          echo "target_image=${{ env.REGISTRY }}/$IMAGE_NAME_LOWER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: make build

      - name: Tag and push image
        run: |
          docker tag "${{ steps.vars.outputs.source_image }}" "${{ steps.vars.outputs.target_image }}:${{ steps.vars.outputs.tag }}"
          docker push "${{ steps.vars.outputs.target_image }}:${{ steps.vars.outputs.tag }}"
